<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiğit Elektrik | Güvenilir ve Kaliteli Hizmet</title>
    <style>
        /* Tasarım Stilleri (Daha önce yaptığımız şık ve kurumsal yapı) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; color: #ffffff; line-height: 1.6; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #111111; border-bottom: 2px solid #f59e0b; position: relative; }
        .logo { font-size: 22px; font-weight: bold; color: #ffffff; }
        .menu-3nokta { cursor: pointer; font-size: 26px; color: #f59e0b; padding: 5px 10px; }
        .dropdown-menu { display: none; position: absolute; top: 60px; right: 20px; background-color: #222222; border: 1px solid #444444; border-radius: 12px; width: 240px; z-index: 100; box-shadow: 0 8px 25px rgba(0,0,0,0.7); overflow: hidden; }
        .dropdown-menu button, .dropdown-menu a { display: block; width: 100%; padding: 14px 16px; background: none; border: none; color: white; text-align: left; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; border-bottom: 1px solid #333333; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .baslik-alan { text-align: center; margin: 30px 0; }
        .hizmet-ozellikleri { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .ozellik-kart { background-color: #222222; border: 1px solid #333333; padding: 20px; border-radius: 12px; text-align: center; border-top: 3px solid #f59e0b; }
        .iletisim-kunye { background-color: #111111; border: 1px solid #333333; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .pencere-arka { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; }
        .pencere-icerik { background-color: #222222; padding: 25px; border-radius: 16px; width: 95%; max-width: 500px; border: 1px solid #444444; }
        .form-grup { margin-bottom: 12px; }
        .form-grup input, .form-grup textarea { width: 100%; padding: 10px; background-color: #111111; border: 1px solid #333333; border-radius: 6px; color: white; }
        .btn-onay { width: 100%; background-color: #22c55e; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .yonetim-paneli { display: none; background-color: #111111; border: 2px solid #f59e0b; border-radius: 12px; padding: 20px; margin-top: 30px; }
        footer { background-color: #111111; text-align: center; padding: 25px; margin-top: 60px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">Yiğit Elektrik</div>
        <div class="menu-3nokta" onclick="menuyuAcKapa(event)">⋮</div>
        <div class="dropdown-menu" id="acilirMenü">
            <a href="tel:05011897556" id="menuAcilLink">🚨 Acil Servis</a>
            <button onclick="pencereAc('SiparisArayuzu')">🛒 Sipariş Ver</button>
            <button onclick="pencereAc('RandevuArayuzu')">📅 Randevu Al</button>
            <button onclick="kurumsalGirisYap()">🔑 Kurumsal Giriş</button>
        </div>
    </div>

    <div class="container">
        <div class="baslik-alan">
            <h1>Yiğit Elektrik Mühendislik</h1>
            <p>Cizre'nin en güvenilir teknik servis noktası.</p>
        </div>
        
        <div class="hizmet-ozellikleri">
            <div class="ozellik-kart"><h3>⚡ 7/24 Hızlı Servis</h3><p>Anında müdahale.</p></div>
            <div class="ozellik-kart"><h3>💎 Kaliteli Malzeme</h3><p>Uzun ömürlü çözümler.</p></div>
        </div>

        <div class="iletisim-kunye">
            <h3>📍 İletişim</h3>
            <p>Tel: 0501 189 75 56</p>
        </div>

        <div class="yonetim-paneli" id="yoneticiAlani">
            <h2 style="color: #ef4444;">🛠️ Yönetim Paneli</h2>
            <div id="panelKayitListesi"></div>
        </div>
    </div>

    <!-- Pencereler (Sipariş/Randevu) -->
    <div class="pencere-arka" id="SiparisArayuzu">
        <div class="pencere-icerik">
            <h2>Sipariş Bilgileri</h2>
            <form id="siparisFormu">
                <div class="form-grup"><label>İsim</label><input type="text" id="sAd" required></div>
                <div class="form-grup"><label>Not</label><textarea id="sAdres" required></textarea></div>
                <button type="submit" class="btn-onay">Gönder</button>
            </form>
        </div>
    </div>

    <div class="pencere-arka" id="RandevuArayuzu">
        <div class="pencere-icerik">
            <h2>Randevu Oluştur</h2>
            <form id="randevuFormu">
                <div class="form-grup"><label>İsim</label><input type="text" id="rAd" required></div>
                <button type="submit" class="btn-onay">Randevu Al</button>
            </form>
        </div>
    </div>

    <script>
        // --- GÜVENLİK VE MESAJ SİSTEMİ ---
        const USTA_TEL = "05011897556";

        function menuyuAcKapa(e) { e.stopPropagation(); document.getElementById('acilirMenü').style.display = (document.getElementById('acilirMenü').style.display === 'block') ? 'none' : 'block'; }
        window.onclick = function() { document.getElementById('acilirMenü').style.display = 'none'; }
        function pencereAc(id) { document.getElementById(id).style.display = 'flex'; }

        // --- KURUMSAL GİRİŞ (GÜVENLİK EKLENDİ) ---
        function kurumsalGirisYap() {
            const sifre = prompt('Kurumsal Giriş Şifresini Giriniz:');
            
            if (sifre === 'Bereket2888') {
                document.getElementById('yoneticiAlani').style.display = 'block';
                alert('Hoş geldin Şef!');
            } else if (sifre !== null) {
                // İzinsiz Giriş Durumu
                alert('⚠️ HATALI ŞİFRE! Güvenlik birimi uyarıldı.');
                const uyari = "🚨 DİKKAT! Yiğit Elektrik paneline hatalı şifre ile izinsiz giriş denemesi yapıldı!";
                window.location.href = `sms:${USTA_TEL}?body=${encodeURIComponent(uyari)}`;
            }
        }

        // --- SİPARİŞ VE RANDEVU SMS TETİKLEYİCİ ---
        document.getElementById('siparisFormu').addEventListener('submit', function(e) {
            e.preventDefault();
            const isim = document.getElementById('sAd').value;
            const not = document.getElementById('sAdres').value;
            const msg = `🛒 Yeni Sipariş: ${isim} - ${not}`;
            window.location.href = `sms:${USTA_TEL}?body=${encodeURIComponent(msg)}`;
        });

        document.getElementById('randevuFormu').addEventListener('submit', function(e) {
            e.preventDefault();
            const isim = document.getElementById('rAd').value;
            const msg = `📅 Yeni Randevu Talebi: ${isim}`;
            window.location.href = `sms:${USTA_TEL}?body=${encodeURIComponent(msg)}`;
        });
    </script>
</body>
</html>
